<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open World Hill Climb 🚗</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      user-select: none;
    }
    canvas { display: block; }

    /* HUD */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 14px 20px;
      pointer-events: none;
      z-index: 10;
    }
    .hud-panel {
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 10px 18px;
      color: #fff;
      min-width: 130px;
    }
    .hud-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2px;
    }
    .hud-value {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 700;
    }
    #score-val  { color: #ffd700; }
    #speed-val  { color: #00e5ff; }
    #coins-val  { color: #ff9800; }
    #dist-val   { color: #76ff03; }

    /* Fuel bar */
    #fuel-wrap {
      width: 200px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 10px 18px;
    }
    #fuel-bar-bg {
      height: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 6px;
      margin-top: 4px;
      overflow: hidden;
    }
    #fuel-bar-fill {
      height: 100%;
      width: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #ff4444, #ff9800, #76ff03);
      transition: width 0.2s;
    }

    /* Game Over / Start overlays */
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 100;
      color: #fff;
    }
    .overlay h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(36px, 7vw, 72px);
      font-weight: 900;
      background: linear-gradient(135deg, #ffd700, #ff9800, #ff4081);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      margin-bottom: 12px;
      text-align: center;
    }
    .overlay p {
      color: rgba(255,255,255,0.65);
      font-size: 15px;
      margin-bottom: 30px;
      text-align: center;
    }
    .btn {
      padding: 14px 44px;
      font-family: 'Orbitron', monospace;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, #ffd700, #ff9800);
      color: #000;
      letter-spacing: 2px;
      box-shadow: 0 0 30px rgba(255,180,0,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
      pointer-events: all;
    }
    .btn:hover  { transform: scale(1.06); box-shadow: 0 0 45px rgba(255,180,0,0.8); }
    .btn:active { transform: scale(0.97); }

    #stats-over {
      display: flex;
      gap: 30px;
      margin-bottom: 30px;
    }
    .stat-box {
      text-align: center;
      background: rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 10px 20px;
      min-width: 90px;
    }
    .stat-box span { display: block; }
    .stat-box .sl { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
    .stat-box .sv { font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 700; }

    /* Mobile controls */
    #mobile-controls {
      position: fixed;
      bottom: 30px;
      left: 0; right: 0;
      display: none; /* hidden on large displays */
      justify-content: space-between;
      padding: 0 40px;
      z-index: 100;
      pointer-events: none;
    }
    .ctrl-btn {
      width: 85px; height: 85px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      cursor: pointer;
      pointer-events: all;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .ctrl-btn:active { 
      background: rgba(255,255,255,0.35); 
      transform: scale(0.92);
      border-color: rgba(255,255,255,0.6);
    }

    /* Notification toasts */
    #toasts {
      position: fixed;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      padding: 8px 22px;
      border-radius: 30px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      color: #ffd700;
      animation: toastIn 0.3s ease, toastOut 0.4s ease 1.6s forwards;
    }
    @keyframes toastIn  { from { opacity:0; transform:scale(0.8) translateY(-10px); } to { opacity:1; transform:scale(1) translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-15px); } }

    /* Speed effect */
    #speed-lines {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    /* Responsive */
    @media (max-width: 900px) {
      #mobile-controls { display: flex; }
      #hud { padding: 10px; gap: 8px; }
      .hud-panel { min-width: auto; padding: 8px 12px; }
      .hud-label { font-size: 9px; }
      .hud-value { font-size: 15px; }
      #fuel-wrap { width: 130px; }
    }
    @media (max-height: 500px) {
      #mobile-controls { bottom: 10px; padding: 0 20px; }
      .ctrl-btn { width: 65px; height: 65px; font-size: 24px; }
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-panel">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="score-val">0</div>
    </div>
    <div id="fuel-wrap">
      <div class="hud-label">⛽ Fuel</div>
      <div id="fuel-bar-bg"><div id="fuel-bar-fill"></div></div>
    </div>
    <div class="hud-panel" style="display:flex;gap:24px;">
      <div>
        <div class="hud-label">Speed</div>
        <div class="hud-value" id="speed-val">0</div>
      </div>
      <div>
        <div class="hud-label">🪙 Coins</div>
        <div class="hud-value" id="coins-val">0</div>
      </div>
    </div>
    <div class="hud-panel">
      <div class="hud-label">Distance</div>
      <div class="hud-value" id="dist-val">0 m</div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toasts"></div>

  <!-- Mobile controls -->
  <div id="mobile-controls">
    <div class="ctrl-btn" id="btn-left">◀</div>
    <div class="ctrl-btn" id="btn-right">▶</div>
  </div>

  <!-- Start screen -->
  <div class="overlay" id="start-screen">
    <h1>Open World<br>Hill Climb 🚗</h1>
    <p>Arrow keys / WASD • Collect coins • Don't run out of fuel!</p>
    <button class="btn" onclick="startGame()">START GAME</button>
  </div>

  <!-- Game Over screen -->
  <div class="overlay" id="gameover-screen" style="display:none;">
    <h1>Game Over</h1>
    <div id="stats-over">
      <div class="stat-box"><span class="sl">Score</span><span class="sv" id="go-score" style="color:#ffd700">0</span></div>
      <div class="stat-box"><span class="sl">Coins</span><span class="sv" id="go-coins" style="color:#ff9800">0</span></div>
      <div class="stat-box"><span class="sl">Distance</span><span class="sv" id="go-dist"  style="color:#76ff03">0m</span></div>
    </div>
    <button class="btn" onclick="startGame()">PLAY AGAIN</button>
  </div>

  <script>
  // ─── Canvas Setup ──────────────────────────────────────────────────────────
  const canvas = document.getElementById('game-canvas');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); generateInitialTerrain(); });

  // ─── Game State ────────────────────────────────────────────────────────────
  let gameRunning = false;
  let animId = null;
  let score = 0, coins = 0, distance = 0;
  let fuel = 100;
  let bestScore = parseInt(localStorage.getItem('hcBest') || '0');

  // ─── Input ─────────────────────────────────────────────────────────────────
  const keys = {};
  let mobileLeft = false, mobileRight = false;
  
  addEventListener('keydown', e => { keys[e.key] = true; });
  addEventListener('keyup',   e => { keys[e.key] = false; });

  // Mobile touches via JS for higher reliability
  const btnL = document.getElementById('btn-left');
  const btnR = document.getElementById('btn-right');
  ['touchstart', 'mousedown'].forEach(evt => {
    btnL.addEventListener(evt, e => { e.preventDefault(); mobileLeft = true; });
    btnR.addEventListener(evt, e => { e.preventDefault(); mobileRight = true; });
  });
  ['touchend', 'mouseup', 'mouseleave'].forEach(evt => {
    btnL.addEventListener(evt, () => { mobileLeft = false; });
    btnR.addEventListener(evt, () => { mobileRight = false; });
  });

  function isLeft()  { return keys['ArrowLeft']  || keys['a'] || keys['A'] || mobileLeft; }
  function isRight() { return keys['ArrowRight'] || keys['d'] || keys['D'] || mobileRight; }

  // ─── Terrain Generation ────────────────────────────────────────────────────
  const SEG = 14;          // segment pixel width (smaller = smoother hills)
  const SEGS_VISIBLE = () => Math.ceil(canvas.width / SEG) + 6;

  let terrain = [];        // array of {x, y} world coords
  let worldOffset = 0;     // how many pixels we've scrolled
  let terrainSeed = 0;     // increments as we generate right
  let noiseAcc = 0;        // accumulated noise angle for terrain

  function terrainY(idx) {
    // Much flatter hills — reduced amplitudes for a smoother road feel
    const base = canvas.height * 0.62;
    const a1 = canvas.height * 0.055 * Math.sin(idx * 0.07 + 0);
    const a2 = canvas.height * 0.028 * Math.sin(idx * 0.17 + 1.7);
    const a3 = canvas.height * 0.012 * Math.sin(idx * 0.45 + 3.1);
    return base + a1 + a2 + a3;
  }

  function generateInitialTerrain() {
    terrain = [];
    terrainSeed = 0;
    const total = SEGS_VISIBLE() + 30;
    for (let i = 0; i < total; i++) {
      terrain.push({ x: i * SEG, y: terrainY(terrainSeed++) });
    }
  }

  function extendTerrainRight() {
    // Add new segments continuously using the ever-growing terrainSeed
    const needed = worldOffset + canvas.width + SEG * 12;
    while (terrain[terrain.length - 1].x < needed) {
      const prevX = terrain[terrain.length - 1].x;
      terrain.push({ x: prevX + SEG, y: terrainY(terrainSeed++) });
    }
    // Remove far-left segments to prevent unbounded growth without resetting the generation index
    while (terrain.length > 500 && terrain[0].x < worldOffset - SEG * 20) {
      terrain.shift();
    }
  }

  // ─── Get terrain Y at a given world X  (O(1) — uses direct index math) ──────
  function getGroundY(worldX) {
    if (!terrain.length) return canvas.height * 0.55;
    const firstX = terrain[0].x;
    const rawIdx = (worldX - firstX) / SEG;
    const i = Math.floor(rawIdx);
    if (i < 0) return terrain[0].y;
    if (i >= terrain.length - 1) return terrain[terrain.length - 1].y;
    const t = rawIdx - i;
    return terrain[i].y + (terrain[i + 1].y - terrain[i].y) * t;
  }

  function getGroundAngle(worldX) {
    const dy = getGroundY(worldX + 1) - getGroundY(worldX - 1);
    return Math.atan2(dy, 2);
  }

  // ─── Car ───────────────────────────────────────────────────────────────────
  const CAR_W = 72, CAR_H = 28;
  const WHEEL_R = 13;
  const AXLE_FRONT = 26, AXLE_REAR = -26; // relative to car center

  const car = {
    worldX: SEG * 5,
    worldY: 0,
    vx: 0,
    vy: 0,
    angle: 0,        // visual tilt
    onGround: false,
    wheelAngle: 0,
    airTime: 0,
  };

  // ─── Coins ─────────────────────────────────────────────────────────────────
  let coinObjs = [];
  let fuelObjs = [];

  function spawnPickups() {
    const rightEdge = worldOffset + canvas.width;
    // Coins every ~200px world X
    const lastCoinX = coinObjs.length ? coinObjs[coinObjs.length - 1].x : worldOffset;
    if (rightEdge - lastCoinX > 180 + Math.random() * 80) {
      const cx = rightEdge + Math.random() * 60;
      coinObjs.push({ x: cx, y: getGroundY(cx) - 38, collected: false, anim: 0 });
    }
    // Fuel cans every ~700px
    const lastFuelX = fuelObjs.length ? fuelObjs[fuelObjs.length - 1].x : worldOffset;
    if (rightEdge - lastFuelX > 600 + Math.random() * 200) {
      const fx = rightEdge + Math.random() * 80;
      fuelObjs.push({ x: fx, y: getGroundY(fx) - 30, collected: false });
    }
  }

  function cleanPickups() {
    coinObjs = coinObjs.filter(c => c.x > worldOffset - 200);
    fuelObjs = fuelObjs.filter(f => f.x > worldOffset - 200);
  }

  // ─── Particles ─────────────────────────────────────────────────────────────
  let particles = [];

  function spawnDust(x, y, count = 4) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x, y, vx: (Math.random() - 0.5) * 2.5, vy: -Math.random() * 1.5 - 0.5,
        life: 1, size: Math.random() * 5 + 2, color: '#c8a96e'
      });
    }
  }

  function spawnCoinBurst(x, y) {
    for (let i = 0; i < 10; i++) {
      const a = (Math.PI * 2 / 10) * i;
      particles.push({
        x, y, vx: Math.cos(a) * 3, vy: Math.sin(a) * 3,
        life: 1, size: 4, color: `hsl(${40 + Math.random()*20},100%,60%)`
      });
    }
  }

  // ─── Stars ─────────────────────────────────────────────────────────────────
  const stars = Array.from({ length: 200 }, () => ({
    x: Math.random(), y: Math.random() * 0.58,
    r: Math.random() * 1.8 + 0.2,
    twinkle: Math.random() * Math.PI * 2
  }));

  // ─── Realistic Pre-rendered Trees ──────────────────────────────────────────
  const treeCanvas = document.createElement('canvas');
  treeCanvas.width = 200;
  treeCanvas.height = 280;
  const tctx = treeCanvas.getContext('2d');
  
  function renderTreeOffscreen() {
    const cx = 100;
    // Trunk
    tctx.fillStyle = '#1e140d';
    tctx.fillRect(cx - 8, 220, 16, 60);
    // Branches
    for (let i = 0; i < 45; i++) {
      const y = 30 + i * 4.5;
      const w = 20 + i * 1.8;
      tctx.fillStyle = `hsl(${135 + Math.random()*15}, 40%, ${8 + Math.random()*12}%)`;
      tctx.beginPath();
      tctx.moveTo(cx, y - 10);
      // Jagged right side
      tctx.lineTo(cx + w/2, y + 5);
      tctx.lineTo(cx + w + Math.random()*12, y + 15 + Math.random()*5);
      tctx.lineTo(cx + w/2, y + 10 + Math.random()*5);
      // Jagged left side
      tctx.lineTo(cx - w/2, y + 10 + Math.random()*5);
      tctx.lineTo(cx - w - Math.random()*12, y + 15 + Math.random()*5);
      tctx.lineTo(cx - w/2, y + 5);
      
      tctx.closePath();
      tctx.fill();
    }
    // Moon-light rim highlight on the left edges
    tctx.globalCompositeOperation = 'source-atop';
    tctx.fillStyle = 'rgba(160, 200, 255, 0.12)';
    tctx.fillRect(0, 0, cx - 10, 280); 
    tctx.globalCompositeOperation = 'source-over';
  }
  renderTreeOffscreen();

  let trees = [];

  function spawnTrees() {
    const rightEdge = worldOffset + canvas.width;
    const lastTreeX = trees.length ? trees[trees.length - 1].x : worldOffset;
    if (rightEdge - lastTreeX > 80 + Math.random() * 120) {
      const tx = rightEdge + Math.random() * 50 + 20;
      const scale = 0.5 + Math.random() * 0.7;  // size variation
      trees.push({ x: tx, scale });
    }
    // purge far-left trees
    trees = trees.filter(t => t.x > worldOffset - 240);
  }

  // Night is always active — no day/night toggle
  const dayTime = 0.7; // locked in deep night

  function skyColor(t) {
    // t 0=day 1=night
    const day   = [135, 206, 250];
    const dusk  = [255, 120, 60];
    const night = [10, 12, 35];
    let r, g, b;
    if (t < 0.4) {
      const f = t / 0.4;
      r = day[0]+(dusk[0]-day[0])*f; g = day[1]+(dusk[1]-day[1])*f; b = day[2]+(dusk[2]-day[2])*f;
    } else if (t < 0.55) {
      const f = (t-0.4)/0.15;
      r = dusk[0]+(night[0]-dusk[0])*f; g = dusk[1]+(night[1]-dusk[1])*f; b = dusk[2]+(night[2]-dusk[2])*f;
    } else if (t < 0.9) {
      [r,g,b] = night;
    } else {
      const f = (t-0.9)/0.1;
      r = night[0]+(day[0]-night[0])*f; g = night[1]+(day[1]-night[1])*f; b = night[2]+(day[2]-night[2])*f;
    }
    return `rgb(${r|0},${g|0},${b|0})`;
  }

  // ─── Clouds ────────────────────────────────────────────────────────────────
  let clouds = Array.from({ length: 7 }, (_, i) => ({
    x: Math.random() * canvas.width, y: 40 + Math.random() * canvas.height * 0.25,
    speed: 0.2 + Math.random() * 0.3, scale: 0.7 + Math.random() * 0.7,
    opacity: 0.6 + Math.random() * 0.4
  }));

  // ─── Score milestones ──────────────────────────────────────────────────────
  let lastMilestone = 0;

  // ─── Cached gradient objects (recreated only on resize) ────────────────────
  let cachedSkyGrad   = null;
  let cachedTerrGrad  = null;
  let cachedTerrNight = null;
  let gradW = 0, gradH = 0;

  function rebuildGradients() {
    gradW = canvas.width; gradH = canvas.height;
    cachedSkyGrad = null; // sky changes with dayTime so we rebuild cheaply below
    cachedTerrGrad = ctx.createLinearGradient(0, gradH * 0.4, 0, gradH);
    cachedTerrGrad.addColorStop(0, '#3a8a1a');
    cachedTerrGrad.addColorStop(0.3, '#5a3010');
    cachedTerrGrad.addColorStop(1, '#2a1505');
    cachedTerrNight = ctx.createLinearGradient(0, gradH * 0.4, 0, gradH);
    cachedTerrNight.addColorStop(0, '#1a2a10');
    cachedTerrNight.addColorStop(0.4, '#3a2010');
    cachedTerrNight.addColorStop(1, '#1a0e05');
  }
  rebuildGradients();
  window.addEventListener('resize', rebuildGradients);

  function drawCloud(x, y, scale, opacity) {
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x, y, 30 * scale, 0, Math.PI * 2);
    ctx.arc(x + 28 * scale, y - 10 * scale, 22 * scale, 0, Math.PI * 2);
    ctx.arc(x - 22 * scale, y - 5 * scale, 18 * scale, 0, Math.PI * 2);
    ctx.arc(x + 50 * scale, y, 20 * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawBackground() {
    // ── Permanent night sky gradient ──
    if (canvas.width !== gradW || canvas.height !== gradH) rebuildGradients();
    const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.72);
    skyGrad.addColorStop(0,   '#020818');
    skyGrad.addColorStop(0.5, '#04102e');
    skyGrad.addColorStop(1,   '#0a1a10');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ── Stars — batched, no save/restore per star ──
    ctx.fillStyle = '#ffffff';
    stars.forEach(s => {
      s.twinkle += 0.022;
      ctx.globalAlpha = 0.4 + 0.6 * Math.abs(Math.sin(s.twinkle));
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // ── Shooting star (occasional) ──
    const now = performance.now();
    const shotT = (now * 0.0002) % 1;
    if (shotT < 0.015) {
      const sx = canvas.width * 0.8 - shotT * canvas.width * 3;
      const sy = canvas.height * 0.05 + shotT * canvas.height * 0.3;
      ctx.save();
      ctx.globalAlpha = Math.sin(shotT / 0.015 * Math.PI) * 0.9;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + 60, sy - 20); ctx.stroke();
      ctx.restore();
    }

    // ── Moon with craters and glow ──
    const moonX = canvas.width * 0.78;
    const moonY = canvas.height * 0.14;
    const moonR = 38;
    // Outer glow
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#c8d8ff';
    ctx.beginPath(); ctx.arc(moonX, moonY, moonR + 22, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.32;
    ctx.beginPath(); ctx.arc(moonX, moonY, moonR + 10, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // Moon body
    ctx.fillStyle = '#d8e4f8';
    ctx.beginPath(); ctx.arc(moonX, moonY, moonR, 0, Math.PI*2); ctx.fill();
    // Crescent shadow
    ctx.fillStyle = '#b0c4de';
    ctx.beginPath();
    ctx.arc(moonX, moonY, moonR, 0, Math.PI*2);
    ctx.fill();
    // Craters
    [[moonX-10, moonY-8, 6], [moonX+12, moonY+6, 4], [moonX-2, moonY+14, 5],
     [moonX+8, moonY-16, 3], [moonX-18, moonY+5, 3]].forEach(([cx,cy,cr]) => {
      ctx.fillStyle = 'rgba(80,100,140,0.4)';
      ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI*2); ctx.fill();
    });

    // ── Clouds (dark, barely visible at night) ──
    clouds.forEach(c => {
      c.x -= c.speed * 0.5;
      if (c.x < -150) c.x = canvas.width + 100;
      ctx.globalAlpha = 0.06;
      ctx.fillStyle = '#4466aa';
      ctx.beginPath();
      ctx.arc(c.x, c.y, 38 * c.scale, 0, Math.PI*2);
      ctx.arc(c.x + 34*c.scale, c.y - 12*c.scale, 26*c.scale, 0, Math.PI*2);
      ctx.arc(c.x - 26*c.scale, c.y - 6*c.scale, 22*c.scale, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // ── Distant mountains — dark silhouette ──
    ctx.fillStyle = '#0d1a0d';
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);
    const mOff = worldOffset * 0.12;
    for (let mx = 0; mx <= canvas.width + 80; mx += 80) {
      const my = canvas.height * 0.48
               - Math.abs(Math.sin((mx + mOff) * 0.009))  * canvas.height * 0.20
               - Math.abs(Math.sin((mx + mOff) * 0.022)) * canvas.height * 0.10;
      ctx.lineTo(mx, my);
    }
    ctx.lineTo(canvas.width, canvas.height);
    ctx.closePath();
    ctx.fill();
  }

  function drawTerrain() {
    const offset = worldOffset;

    // Night terrain gradient (always)
    const firstX = terrain[0].x;
    const startIdx = Math.max(0, Math.floor((offset - firstX) / SEG) - 2);
    const endIdx   = Math.min(terrain.length - 1, startIdx + SEGS_VISIBLE() + 4);

    // Main terrain fill
    ctx.beginPath();
    ctx.moveTo(terrain[startIdx].x - offset, canvas.height);
    for (let i = startIdx; i <= endIdx; i++) {
      ctx.lineTo(terrain[i].x - offset, terrain[i].y);
    }
    ctx.lineTo(terrain[endIdx].x - offset, canvas.height);
    ctx.closePath();
    ctx.fillStyle = cachedTerrNight;
    ctx.fill();

    // ── Road surface (lighter strip on top of terrain) ──
    ctx.beginPath();
    ctx.moveTo(terrain[startIdx].x - offset, terrain[startIdx].y + 2);
    for (let i = startIdx + 1; i <= endIdx; i++) {
      ctx.lineTo(terrain[i].x - offset, terrain[i].y + 2);
    }
    ctx.strokeStyle = '#1a2a14';
    ctx.lineWidth = 6;
    ctx.stroke();

    // ── Grass surface line ──
    ctx.beginPath();
    ctx.moveTo(terrain[startIdx].x - offset, terrain[startIdx].y);
    for (let i = startIdx + 1; i <= endIdx; i++) {
      ctx.lineTo(terrain[i].x - offset, terrain[i].y);
    }
    ctx.strokeStyle = '#2a6e14';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // ── Grass tufts along the surface ──
    ctx.strokeStyle = '#3a8a1a';
    ctx.lineWidth = 1.5;
    for (let i = startIdx; i <= endIdx; i += 3) {
      if (i % 7 !== 0) continue; // sparse
      const gx = terrain[i].x - offset;
      const gy = terrain[i].y;
      // 3 blades per tuft
      for (let b = -1; b <= 1; b++) {
        ctx.beginPath();
        ctx.moveTo(gx + b * 4, gy);
        ctx.quadraticCurveTo(gx + b * 4 + b * 2, gy - 7, gx + b * 6 + b * 1, gy - 10);
        ctx.stroke();
      }
    }

    // ── Trees (Realistic) ──
    trees.forEach(t => {
      const sx = t.x - offset;
      if (sx < -140 || sx > canvas.width + 140) return;
      
      const gy = getGroundY(t.x) + 2; 
      const dw = 140 * t.scale;
      const dh = 196 * t.scale;
      
      ctx.drawImage(treeCanvas, sx - dw/2, gy - dh * 0.95, dw, dh);
    });
  }

  function drawCar() {
    const sx = canvas.width / 2;
    const sy = car.worldY;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(car.angle);

    // ── Shadow ──
    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = '#000';
    ctx.scale(1, 0.22);
    ctx.beginPath();
    ctx.ellipse(0, CAR_H * 3.5, CAR_W * 0.6, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // ── Headlight cone (night beam on ground) ──
    ctx.save();
    ctx.globalAlpha = 0.10;
    ctx.fillStyle = '#fffaaa';
    ctx.beginPath();
    ctx.moveTo(CAR_W/2 - 2, CAR_H/4);
    ctx.lineTo(CAR_W/2 + 120, CAR_H/2 + 30);
    ctx.lineTo(CAR_W/2 + 120, CAR_H/2 + 50);
    ctx.lineTo(CAR_W/2 - 2, CAR_H/4 + 12);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // ── Undercarriage / chassis ──
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.roundRect(-CAR_W/2 + 4, CAR_H/2 - 4, CAR_W - 8, 10, 3);
    ctx.fill();

    // ── Exhaust pipe ──
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.roundRect(-CAR_W/2 - 6, CAR_H/2 - 1, 10, 4, 2);
    ctx.fill();
    // exhaust puff when moving
    if (Math.abs(car.vx) > 0.5) {
      ctx.globalAlpha = 0.3 * (Math.abs(car.vx) / 9);
      ctx.fillStyle = '#8899aa';
      ctx.beginPath();
      ctx.arc(-CAR_W/2 - 12, CAR_H/2, 4 + Math.random()*4, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // ── Car body ──
    const bodyGrad = ctx.createLinearGradient(-CAR_W/2, -CAR_H*0.9, CAR_W/2, CAR_H*0.6);
    bodyGrad.addColorStop(0, '#ff5060');
    bodyGrad.addColorStop(0.35, '#cc0018');
    bodyGrad.addColorStop(1, '#6a000a');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.roundRect(-CAR_W/2, -CAR_H/2, CAR_W, CAR_H, [4,4,3,3]);
    ctx.fill();
    // Body side highlight
    ctx.strokeStyle = 'rgba(255,120,130,0.35)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-CAR_W/2 + 8, -CAR_H/2 + 3);
    ctx.lineTo(CAR_W/2 - 8, -CAR_H/2 + 3);
    ctx.stroke();

    // ── Door line ──
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(2, -CAR_H/2);
    ctx.lineTo(2, CAR_H/2 - 2);
    ctx.stroke();
    // Door handle
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.roundRect(4, -4, 10, 4, 2);
    ctx.fill();

    // ── Roof ──
    const roofGrad = ctx.createLinearGradient(-CAR_W*0.26, -CAR_H*1.15, 0, -CAR_H*0.45);
    roofGrad.addColorStop(0, '#ff7080');
    roofGrad.addColorStop(1, '#b00018');
    ctx.fillStyle = roofGrad;
    ctx.beginPath();
    ctx.roundRect(-CAR_W*0.28, -CAR_H*1.10, CAR_W*0.56, CAR_H*0.62, [8,8,0,0]);
    ctx.fill();

    // ── Windows ──
    // Rear window
    ctx.fillStyle = 'rgba(80,180,255,0.45)';
    ctx.beginPath();
    ctx.roundRect(-CAR_W*0.25, -CAR_H*1.02, CAR_W*0.22, CAR_H*0.52, [4,4,0,0]);
    ctx.fill();
    // Front window
    ctx.fillStyle = 'rgba(80,200,255,0.5)';
    ctx.beginPath();
    ctx.roundRect(CAR_W*0.01, -CAR_H*1.02, CAR_W*0.23, CAR_H*0.52, [4,4,0,0]);
    ctx.fill();
    // Window glare streak
    ctx.globalAlpha = 0.2;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-CAR_W*0.23, -CAR_H*0.98);
    ctx.lineTo(-CAR_W*0.15, -CAR_H*0.55);
    ctx.moveTo(CAR_W*0.03, -CAR_H*0.98);
    ctx.lineTo(CAR_W*0.10, -CAR_H*0.55);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // ── Antenna ──
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-CAR_W*0.26, -CAR_H*1.10);
    ctx.lineTo(-CAR_W*0.26 - 4, -CAR_H*1.10 - 16);
    ctx.stroke();
    ctx.fillStyle = '#ff3344';
    ctx.beginPath();
    ctx.arc(-CAR_W*0.26 - 4, -CAR_H*1.10 - 17, 2, 0, Math.PI*2);
    ctx.fill();

    // ── Headlights (front) ──
    ctx.fillStyle = '#ffffc0';
    ctx.beginPath();
    ctx.roundRect(CAR_W/2 - 2, -CAR_H/2 + 4, 5, 7, 2);
    ctx.fill();
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#ffe080';
    ctx.beginPath();
    ctx.arc(CAR_W/2, -CAR_H/2 + 7, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // ── Tail lights (rear) ──
    ctx.fillStyle = car.vx < -0.5 ? '#ff2200' : '#880000';
    ctx.beginPath();
    ctx.roundRect(-CAR_W/2 - 3, -CAR_H/2 + 4, 5, 6, 2);
    ctx.fill();
    if (car.vx < -0.5) {
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#ff4400';
      ctx.beginPath(); ctx.arc(-CAR_W/2, -CAR_H/2 + 7, 8, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }

    // ── Bumpers ──
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.roundRect(CAR_W/2 - 1, CAR_H/2 - 10, 6, 8, 2); ctx.fill();
    ctx.beginPath(); ctx.roundRect(-CAR_W/2 - 5, CAR_H/2 - 10, 6, 8, 2); ctx.fill();

    // ── Wheels ──
    [AXLE_REAR, AXLE_FRONT].forEach(ax => {
      const wy = CAR_H / 2;
      // Tire
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(ax, wy, WHEEL_R, 0, Math.PI*2); ctx.fill();
      // Tire tread ring
      ctx.strokeStyle = '#2d2d2d';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(ax, wy, WHEEL_R - 1.5, 0, Math.PI*2); ctx.stroke();
      // Rim
      ctx.fillStyle = '#b0b0c0';
      ctx.beginPath(); ctx.arc(ax, wy, WHEEL_R * 0.58, 0, Math.PI*2); ctx.fill();
      // Rim inner
      ctx.fillStyle = '#e0e0f0';
      ctx.beginPath(); ctx.arc(ax, wy, WHEEL_R * 0.26, 0, Math.PI*2); ctx.fill();
      // Spokes (5)
      ctx.strokeStyle = '#8090a8';
      ctx.lineWidth = 2.2;
      for (let s = 0; s < 5; s++) {
        const sa = car.wheelAngle + (s / 5) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(ax + Math.cos(sa) * WHEEL_R * 0.26, wy + Math.sin(sa) * WHEEL_R * 0.26);
        ctx.lineTo(ax + Math.cos(sa) * WHEEL_R * 0.54, wy + Math.sin(sa) * WHEEL_R * 0.54);
        ctx.stroke();
      }
      // Hub cap highlight
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath(); ctx.arc(ax - 2, wy - 2, WHEEL_R * 0.12, 0, Math.PI*2); ctx.fill();
    });

    ctx.restore();
  }

  function drawCoins() {
    const now = performance.now();
    coinObjs.forEach(c => {
      if (c.collected) return;
      const screenX = c.x - worldOffset;
      if (screenX < -30 || screenX > canvas.width + 30) return; // cull off-screen
      const screenY = c.y + Math.sin(now * 0.003 + c.x) * 4 - 5;
      c.anim = now * 0.002 + c.x;

      // Simple glow — no radial gradient per coin per frame
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = '#ffd700';
      ctx.beginPath(); ctx.arc(screenX, screenY, 16, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;

      // Coin body
      ctx.save();
      ctx.translate(screenX, screenY);
      ctx.scale(Math.abs(Math.cos(c.anim)) * 0.6 + 0.4, 1);
      ctx.fillStyle = '#ffd700';
      ctx.strokeStyle = '#ff9800'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#b8860b';
      ctx.font = 'bold 9px Inter'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('$', 0, 0);
      ctx.restore();
    });
  }

  function drawFuelCans() {
    fuelObjs.forEach(f => {
      if (f.collected) return;
      const screenX = f.x - worldOffset;
      const screenY = f.y;
      ctx.save();
      ctx.translate(screenX, screenY);
      // Can body
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath(); ctx.roundRect(-9, -15, 18, 22, 3); ctx.fill();
      ctx.fillStyle = '#c0392b';
      ctx.beginPath(); ctx.roundRect(-9, -15, 18, 8, [3,3,0,0]); ctx.fill();
      // Handle
      ctx.strokeStyle = '#888'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.roundRect(-5, -20, 10, 8, 3); ctx.stroke();
      // Spout
      ctx.fillStyle = '#aaa';
      ctx.beginPath(); ctx.roundRect(6, -18, 6, 4, 1); ctx.fill();
      // Label
      ctx.fillStyle = '#fff'; ctx.font = 'bold 7px Inter';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('⛽', 0, 0);
      ctx.restore();
    });
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x - worldOffset, p.y, p.size * p.life, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
  }

  // ─── Physics update ────────────────────────────────────────────────────────
  const GRAVITY   = 0.45;
  const MAX_SPEED = 9;
  const ACCEL     = 0.28;
  const FRICTION  = 0.88;
  const FUEL_USE  = 0.018;

  function updatePhysics(dt) {
    if (!gameRunning) return;

    const driving = isRight() || isLeft();

    // Fuel consumption while driving
    if (isRight() && fuel > 0) {
      fuel -= FUEL_USE;
      if (fuel <= 0) { fuel = 0; showToast('⛽ OUT OF FUEL!'); endGame(); }
    }

    // Get ground beneath front and rear axles
    const frontWorldX = car.worldX + AXLE_FRONT;
    const rearWorldX  = car.worldX + AXLE_REAR;
    const frontGY = getGroundY(frontWorldX);
    const rearGY  = getGroundY(rearWorldX);

    // Slope angle
    const slope = Math.atan2(frontGY - rearGY, AXLE_FRONT - AXLE_REAR);

    // Check if on ground  (car center wheel area)
    const centerGY = getGroundY(car.worldX);
    const carBottomY = car.worldY + CAR_H/2 + WHEEL_R;
    const onGround = carBottomY >= centerGY - 2;

    if (onGround) {
      // Snap to ground
      car.worldY = centerGY - CAR_H/2 - WHEEL_R;
      car.vy = Math.min(car.vy, 0); // remove downward velocity

      // Drive
      if (isRight() && fuel > 0) {
        car.vx += ACCEL + Math.max(0, -slope) * 0.4;
      }
      if (isLeft()) {
        car.vx -= ACCEL * 0.6;
      }

      // Friction
      if (!driving) car.vx *= FRICTION;
      car.vx = Math.max(-MAX_SPEED * 0.5, Math.min(MAX_SPEED, car.vx));

      // Dust
      if (Math.abs(car.vx) > 1.5 && Math.random() < 0.4) {
        spawnDust(rearWorldX, centerGY, 2);
      }

      car.airTime = 0;
    } else {
      // In air: gravity
      car.vy += GRAVITY;
      car.vx *= 0.995;
      car.airTime++;
    }

    // Move world
    car.worldX += car.vx;
    car.worldY += car.vy;

    // Scroll world – camera follows car
    worldOffset = car.worldX - canvas.width / 2;

    // Clamp left edge
    if (worldOffset < 0) { worldOffset = 0; car.worldX = canvas.width / 2; car.vx = 0; }

    // Visual tilt
    const targetAngle = onGround ? slope : slope * 0.5;
    car.angle += (targetAngle - car.angle) * 0.18;

    // Wheels spin
    car.wheelAngle += car.vx * 0.15;

    // Score & distance
    distance = Math.round(car.worldX / 60);
    score = distance + coins * 15;

    // Milestones
    if (distance > 0 && distance % 200 === 0 && distance !== lastMilestone) {
      lastMilestone = distance;
      showToast(`🏁 ${distance}m — Keep going!`);
    }
  }

  // ─── Collision with pickups ────────────────────────────────────────────────
  function checkPickups() {
    const carScreenX = canvas.width / 2;
    const carY = car.worldY;
    const COIN_RANGE = 28, FUEL_RANGE = 35;

    coinObjs.forEach(c => {
      if (c.collected) return;
      const cx = c.x - worldOffset;
      const cy = c.y;
      const dist2 = (cx - carScreenX)**2 + (cy - carY)**2;
      if (dist2 < COIN_RANGE**2) {
        c.collected = true;
        coins++;
        score = Math.round(distance + coins * 15);
        spawnCoinBurst(c.x - worldOffset, c.y);
        showToast('🪙 +1 Coin!');
      }
    });

    fuelObjs.forEach(f => {
      if (f.collected) return;
      const fx = f.x - worldOffset;
      const fy = f.y;
      const dist2 = (fx - carScreenX)**2 + (fy - carY)**2;
      if (dist2 < FUEL_RANGE**2) {
        f.collected = true;
        fuel = Math.min(100, fuel + 40);
        showToast('⛽ +40% Fuel!');
      }
    });
  }

  // ─── HUD Update ────────────────────────────────────────────────────────────
  function updateHUD() {
    document.getElementById('score-val').textContent = score;
    document.getElementById('speed-val').textContent = Math.abs(Math.round(car.vx * 12)) + ' km/h';
    document.getElementById('coins-val').textContent = coins;
    document.getElementById('dist-val').textContent  = distance + ' m';
    document.getElementById('fuel-bar-fill').style.width = fuel + '%';

    // Fuel bar color
    const fill = document.getElementById('fuel-bar-fill');
    if (fuel < 20)      fill.style.background = '#ff4444';
    else if (fuel < 50) fill.style.background = 'linear-gradient(90deg,#ff4444,#ff9800)';
    else                fill.style.background = 'linear-gradient(90deg,#ff4444,#ff9800,#76ff03)';
  }

  // ─── Toast notifications ───────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.getElementById('toasts').appendChild(t);
    setTimeout(() => t.remove(), 2200);
  }

  // ─── Particles update ──────────────────────────────────────────────────────
  function updateParticles() {
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.06;
      p.life -= 0.03;
    });
    particles = particles.filter(p => p.life > 0);
  }

  // ─── Game Over ─────────────────────────────────────────────────────────────
  function endGame() {
    gameRunning = false;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('hcBest', bestScore);
    }
    document.getElementById('go-score').textContent = score;
    document.getElementById('go-coins').textContent = coins;
    document.getElementById('go-dist').textContent  = distance + 'm';
    document.getElementById('gameover-screen').style.display = 'flex';
  }

  // ─── Start ─────────────────────────────────────────────────────────────────
  function startGame() {
    document.getElementById('start-screen').style.display   = 'none';
    document.getElementById('gameover-screen').style.display = 'none';

    // Reset state
    score = 0; coins = 0; distance = 0; fuel = 100;
    worldOffset = 0; lastMilestone = 0;
    particles = []; coinObjs = []; fuelObjs = []; trees = [];
    terrainSeed = 0;
    generateInitialTerrain();

    car.worldX   = SEG * 8;
    car.worldY   = getGroundY(car.worldX) - CAR_H/2 - WHEEL_R;
    car.vx       = 0;
    car.vy       = 0;
    car.angle    = 0;
    car.airTime  = 0;
    car.wheelAngle = 0;
    gameRunning = true;
    lastTime    = 0; // reset timing so first dt isn't huge

    // Cancel existing loop (there is always one running from boot) then let
    // the same single loop continue — just reset gameRunning flag above.
    // We do NOT start a new requestAnimationFrame here to avoid double loops.
  }

  // ─── Main Loop ─────────────────────────────────────────────────────────────
  let lastTime = 0;
  function gameLoop(ts) {
    // Schedule next frame FIRST so cancellation in endGame works cleanly
    animId = requestAnimationFrame(gameLoop);

    const dt = Math.min(ts - lastTime, 50); // clamp to 50ms max (handles tab-switch lag)
    lastTime = ts;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw world
    drawBackground();
    drawTerrain();
    drawCoins();
    drawFuelCans();
    drawParticles();
    drawCar();

    // Speed lines (at high speed)
    if (gameRunning && car.vx > 5) {
      const intensity = Math.min(1, (car.vx - 5) / 4);
      for (let i = 0; i < 8; i++) {
        const lx = Math.random() * canvas.width;
        const ly = Math.random() * canvas.height;
        ctx.save();
        ctx.globalAlpha = intensity * 0.25;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(lx + car.vx * 5, ly);
        ctx.stroke();
        ctx.restore();
      }
    }

    if (gameRunning) {
      updatePhysics(dt);
      checkPickups();
      extendTerrainRight(); // safely extends based on current last element
      spawnPickups();
      spawnTrees();         // spawn environment trees ahead of player
      cleanPickups();       // prevent coinObjs/fuelObjs from growing unbounded
      updateParticles();
      updateHUD();
    }
  }

  // Boot: generate terrain then start one single animation loop
  generateInitialTerrain();
  animId = requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
